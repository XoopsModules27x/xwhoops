# SonarCloud configuration — OPT-IN security/SAST + quality analysis for this module.
#
# Enable in three steps:
#   1. Import the repository into SonarCloud (https://sonarcloud.io).
#   2. Set sonar.organization and sonar.projectKey below to match your SonarCloud project.
#   3. Add a SONAR_TOKEN secret in the repo's Actions secrets.
# The .github/workflows/sonar.yml workflow stays inert until SONAR_TOKEN is present.

sonar.organization=xoopsmodules27x
sonar.projectKey=XoopsModules27x_xwhoops
sonar.projectName=xwhoops

# Analyse PHP sources; keep vendored code, tooling, generated dirs, and tests out of "sources".
sonar.sources=.
sonar.exclusions=vendor/**,.build/**,node_modules/**,language/**,templates/**,templates_c/**,assets/**,docs/**,rector.php,.php-cs-fixer.dist.php,phpstan-bootstrap.php,stubs/**
sonar.tests=tests
sonar.test.inclusions=tests/**/*Test.php

# Coverage (optional): sonar.yml writes a clover report here when tests + a coverage driver exist.
sonar.php.coverage.reportPaths=.build/coverage/clover.xml

sonar.sourceEncoding=UTF-8
