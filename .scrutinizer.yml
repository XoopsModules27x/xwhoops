# Scrutinizer configuration — XOOPS module DevOps overlay.
# Profile: XoopsCore27 / PHP 8.2+   Overlay version: 1.1.0
# xoops-overlay:profile=core27
#
# NOTE: this template clones ONLY the XoopsCore for the profile. If a module
# depends on other modules (e.g. tag) for class resolution, set the profile's
# SCRUTINIZER_EXTRA_CLONE / SCRUTINIZER_EXTRA_DEP_PATHS tokens — do NOT hardcode
# a dependency here.
build:
  nodes:
    analysis:
      environment:
        php: 8.2
      dependencies:
        after:
          - git clone --depth=1 --branch master https://github.com/XOOPS/XoopsCore27 XoopsCore27
      project_setup:
        override: true
      tests:
        override:
          - php-scrutinizer-run --enable-security-analysis

    php82:
      environment:
        php: 8.2
    php83:
      environment:
        php: 8.3
    php84:
      environment:
        php: 8.4

filter:
  excluded_paths:
    - 'tests/*'
  dependency_paths:
    - 'XoopsCore27/*'
    - 'vendor/*'
